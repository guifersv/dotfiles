[main]
initial-color-theme=dark
# initial-window-size-pixels=700x500
include = ~/.config/foot/themes/oasis_twilight.ini
font=CaskaydiaCove Nerd Font:pixelsize=14:antialias=true

pad=4x4 center
bold-text-in-bright=palette-based
initial-window-size-chars=140x40

[mouse]
hide-when-typing = yes

[csd]
preferred = none

[key-bindings]
show-urls-copy = Control+Shift+p
