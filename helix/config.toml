theme = "oasis_luna"

[editor]
line-number = "relative"
cursorline = true
auto-completion = false

[editor.soft-wrap]
enable = true

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-absolute-path"]
right = ["diagnostics", "position", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"
diagnostics = ["warning", "error"]
workspace-diagnostics = ["warning", "error"]

[keys.normal]
S-l = ":buffer-next"
S-h = ":buffer-previous"
C-s = ":w"
"A-x" = "@x<A-d>"

[keys.insert]
"A-x" = "normal_mode"
j = { k = "normal_mode" }
