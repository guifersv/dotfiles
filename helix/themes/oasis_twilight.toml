# Theme: Oasis Twilight Dark
# Ported from Oasis palettes

"annotation"                      = { fg = "foreground" }

"attribute"                       = { fg = "orange",             modifiers = ["italic"] }

"comment"                         = { fg = "comment" }
"comment.block"                   = { fg = "comment" }
"comment.block.documentation"     = { fg = "comment" }
"comment.line"                    = { fg = "comment" }
"comment.line.documentation"      = { fg = "comment" }

"constant"                        = { fg = "purple" }
"constant.builtin"                = { fg = "purple" }
"constant.builtin.boolean"        = { fg = "purple" }
"constant.character"              = { fg = "cyan" }
"constant.character.escape"       = { fg = "pink" }
"constant.macro"                  = { fg = "purple" }
"constant.numeric"                = { fg = "orange" }
"constructor"                     = { fg = "purple" }

"definition"                      = { underline = { color = "cyan", style = "line" } }

"diagnostic"                      = { underline = { color = "orange", style = "curl" } }
"diagnostic.hint"                 = { underline = { color = "hint",   style = "curl" } }
"diagnostic.warning"              = { underline = { color = "yellow", style = "curl" } }
"diagnostic.error"                = { underline = { color = "red",    style = "curl" } }
"diagnostic.info"                 = { underline = { color = "blue",   style = "curl" } }
"diagnostic.unnecessary"          = { modifiers = ["dim"] }
"diagnostic.deprecated"           = { modifiers = ["crossed_out"] }

"error"                           = { fg = "red" }
"hint"                            = { fg = "hint" }
"info"                            = { fg = "blue" }
"warning"                         = { fg = "yellow" }

"diff.delta"                      = { fg = "orange" }
"diff.minus"                      = { fg = "red" }
"diff.plus"                       = { fg = "green" }

"function"                        = { fg = "blue" }
"function.builtin"                = { fg = "cyan" }
"function.call"                   = { fg = "blue" }
"function.macro"                  = { fg = "purple" }
"function.method"                 = { fg = "blue" }

"keyword"                         = { fg = "pink" }
"keyword.control.conditional"     = { fg = "pink" }
"keyword.control.exception"       = { fg = "pink" }
"keyword.control.import"          = { fg = "pink" }
"keyword.control.repeat"          = { fg = "pink" }
"keyword.directive"               = { fg = "purple" }
"keyword.function"                = { fg = "pink" }
"keyword.operator"                = { fg = "pink" }
"keyword.return"                  = { fg = "pink" }
"keyword.storage"                 = { fg = "pink" }
"keyword.storage.modifier"        = { fg = "pink" }
"keyword.storage.type"            = { fg = "purple",             modifiers = ["italic"] }

"label"                           = { fg = "cyan" }

"markup.bold"                     = { fg = "orange",             modifiers = ["bold"] }
"markup.heading"                  = { fg = "purple",             modifiers = ["bold"] }
"markup.italic"                   = { fg = "yellow",             modifiers = ["italic"] }
"markup.link.text"                = { fg = "pink" }
"markup.link.url"                 = { fg = "cyan" }
"markup.list"                     = { fg = "cyan" }
"markup.quote"                    = { fg = "yellow",             modifiers = ["italic"] }
"markup.raw"                      = { fg = "foreground" }
"markup.strikethrough"            = { modifiers = ["crossed_out"] }

"punctuation"                     = { fg = "foreground" }
"punctuation.bracket"             = { fg = "foreground" }
"punctuation.delimiter"           = { fg = "foreground" }
"punctuation.special"             = { fg = "pink" }

"special"                         = { fg = "pink" }

"string"                          = { fg = "green" }
"string.regexp"                   = { fg = "red" }
"string.special"                  = { fg = "orange" }
"string.symbol"                   = { fg = "green" }

"tag"                             = { fg = "pink" }
"tag.attribute"                   = { fg = "purple" }
"tag.delimiter"                   = { fg = "foreground" }

"type"                            = { fg = "cyan",               modifiers = ["italic"] }
"type.builtin"                    = { fg = "cyan" }
"type.enum.variant"               = { fg = "foreground",         modifiers = ["italic"] }

"ui.background"                   = { fg = "foreground",         bg = "background" }
"ui.cursor"                       = { fg = "background",         bg = "primary" }
"ui.cursor.insert"                = { fg = "background",         bg = "green" }	
"ui.cursor.match"                 = { fg = "foreground",         bg = "selection" }
"ui.cursor.normal"                = { fg = "background",         bg = "primary" }	
"ui.cursor.primary.insert"        = { fg = "background",         bg = "green" }	
"ui.cursor.primary.normal"        = { fg = "background",         bg = "primary" }	
"ui.cursor.primary.select"        = { fg = "background",         bg = "cyan" }
"ui.cursor.select"                = { fg = "background",         bg = "cyan" }
"ui.cursorline.primary"           = { bg = "cursorline" }
"ui.debug"                        = { fg = "red" }
"ui.help"                         = { fg = "foreground",         bg = "darker" }
"ui.highlight.frameline"          = { fg = "background",         bg = "red" }
"ui.linenr"                       = { fg = "comment" }
"ui.linenr.selected"              = { fg = "foreground" }
"ui.menu"                         = { fg = "foreground",         bg = "darker" }
"ui.menu.scroll"                  = { fg = "foreground",         bg = "darker" }
"ui.menu.selected"                = { fg = "background",         bg = "pink" }
"ui.popup"                        = { fg = "foreground",         bg = "darker" }
"ui.selection"                    = { bg = "selection" }
"ui.selection.primary"            = { bg = "selection_primary" }
"ui.statusline"                   = { fg = "foreground",         bg = "darker" }
"ui.statusline.inactive"          = { fg = "comment",            bg = "darker" }
"ui.statusline.insert"            = { fg = "darker",             bg = "green",   modifiers = ["bold"] }
"ui.statusline.normal"            = { fg = "darker",             bg = "purple",  modifiers = ["bold"] }
"ui.statusline.select"            = { fg = "darker",             bg = "cyan",    modifiers = ["bold"] }
"ui.text"                         = { fg = "foreground" }
"ui.text.focus"                   = { fg = "cyan" }
"ui.text.directory"               = { fg = "blue" }
"ui.virtual.indent-guide"         = { fg = "indent" }
"ui.virtual.inlay-hint"           = { fg = "comment" }
"ui.virtual.inlay-hint.parameter" = { fg = "comment",            modifiers = ["italic"] }
"ui.virtual.inlay-hint.type"      = { fg = "comment",            modifiers = ["italic"] }
"ui.virtual.jump-label"           = { fg = "pink",               modifiers = ["bold"] }
"ui.virtual.ruler"                = { bg = "cursorline" }
"ui.virtual.whitespace"           = { fg = "indent" }
"ui.virtual.wrap"                 = { fg = "indent" }
"ui.window"                       = { fg = "darker" }

"variable"                        = { fg = "foreground" }
"variable.builtin"                = { fg = "purple",             modifiers = ["italic"] }
"variable.other"                  = { fg = "foreground" }
"variable.other.member"           = { fg = "foreground" }
"variable.parameter"              = { fg = "orange",             modifiers = ["italic"] }

[palette]
# Backgrounds
background        = "#261A30" # bg_core
darker            = "#201726" # bg_shadow
cursorline        = "#312140" # bg_mantle
selection         = "#4A355E" # bg_surface
selection_primary = "#5E4275" # A more distinct purple for the primary selection
indent            = "#3F2B50"

# Foregrounds
foreground        = "#F0E4F2" # fg_core
comment           = "#71609A" # fg_muted

# Accents
primary           = "#F7997D" # theme_primary
pink              = "#D2ADFF" # theme_secondary / bright_magenta
yellow            = "#F0E68C" # theme_accent / yellow
orange            = "#F8B471" # bright_yellow

# Colors
red               = "#FF7979"
green             = "#7FCF78"
blue              = "#81C0FF"
purple            = "#C695FF" # magenta
cyan              = "#68C0B6"
hint              = "#8FD1C7" # bright_cyan / hint
